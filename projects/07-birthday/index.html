<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday ♡ — Heart Tree</title>
  <meta name="description" content="A cinematic generative birthday scene: a blossom tree grows and blooms into a glowing heart of petals, with an elegant hand-lettered wish." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
  <script>document.documentElement.classList.add('js')</script>
  <link rel="stylesheet" href="./birthday.css" />
</head>
<body>
  <main class="scene">
    <canvas id="tree" class="tree" aria-label="A blossom tree grows and blooms into a heart made of petals" role="img"></canvas>

    <!-- elegant hand-lettered wish (revealed by JS) -->
    <div class="wish" id="wish" aria-hidden="true">
      <p class="wish__eyebrow" id="wEyebrow">make a wish</p>
      <div class="wish__heroWrap"><h1 class="wish__hero" id="wHero">Happy Birthday</h1></div>
      <span class="wish__rule" id="wRule"></span>
      <p class="wish__sub" id="wSub">here&rsquo;s to a wonderful year ahead</p>
    </div>

    <!-- cinematic grade overlays -->
    <div class="grade" aria-hidden="true">
      <div class="grade__vignette"></div>
      <div class="grade__grain"></div>
    </div>
  </main>
  <script type="module" src="./birthday.js"></script>
</body>
</html>
